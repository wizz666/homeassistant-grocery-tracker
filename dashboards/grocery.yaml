                  const v = entity ? entity.state : '–';
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:11px;color:rgba(230,81,0,0.60);margin-bottom:4px;">🏷️</div>
                    <div style="font-size:36px;font-weight:900;color:#e65100;line-height:1;">${v}</div>
                    <div style="font-size:11px;color:rgba(0,0,0,0.45);margin-top:6px;">erbjudanden</div>
                  </div>`;
                ]]]
            styles:
              card:
                - border-radius: 16px
                - background: "rgba(251,140,0,0.08)"
                - border: "1px solid rgba(251,140,0,0.18)"
                - padding: 0
              custom_fields:
                body:
                  - width: 100%

          - type: custom:button-card
            entity: sensor.grocery_offers_matches
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            custom_fields:
              body: |
                [[[
                  const v = entity ? entity.state : '–';
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:11px;color:rgba(230,81,0,0.60);margin-bottom:4px;">✅</div>
                    <div style="font-size:36px;font-weight:900;color:#e65100;line-height:1;">${v}</div>
                    <div style="font-size:11px;color:rgba(0,0,0,0.45);margin-top:6px;">matchar listan</div>
                  </div>`;
                ]]]
            styles:
              card:
                - border-radius: 16px
                - background: "rgba(251,140,0,0.08)"
                - border: "1px solid rgba(251,140,0,0.18)"
                - padding: 0
              custom_fields:
                body:
                  - width: 100%

      # ── Knappar: Uppdatera ────────────────────────────────────────
      - type: button
        name: Uppdatera erbjudanden
        icon: mdi:tag-refresh-outline
        tap_action:
          action: call-service
          service: script.grocery_refresh_offers_btn
        card_mod:
          style: |
            ha-card { border-radius: 14px; background: rgba(251,140,0,0.10); }

      # ── Varor på rea (matchar inköpslistan) ───────────────────────
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.grocery_offers_matches
            above: 0
        card:
          type: custom:button-card
          show_name: false
          show_icon: false
          show_state: false
          tap_action:
            action: none
          custom_fields:
            body: |
              [[[
                const matches = entity
                  ? (entity.attributes.matched_items || [])
                  : [];
                if (!matches.length) return '<div style="padding:12px;color:#666;">Ingen matchning</div>';
                const rows = matches.slice(0,8).map(m => {
                  const o = m.offers[0];
                  return `<tr>
                    <td style="padding:6px 8px;font-weight:600;color:#333;">${m.item}</td>
                    <td style="padding:6px 8px;color:#555;">${o.product}${o.brand ? ' ('+o.brand+')' : ''}</td>
                    <td style="padding:6px 8px;font-weight:700;color:#e65100;">${o.price}</td>
                    <td style="padding:6px 8px;font-size:11px;color:#888;">${o.store_name}</td>
                  </tr>`;
                }).join('');
                return `<div style="padding:12px 4px 4px;">
                  <div style="font-size:13px;font-weight:700;color:#e65100;padding:0 8px 8px;">
                    🛒 Varor på inköpslistan som är på rea
                  </div>
                  <table style="width:100%;border-collapse:collapse;font-size:13px;">
                    <thead><tr style="border-bottom:1px solid rgba(0,0,0,0.08);">
                      <th style="padding:4px 8px;text-align:left;font-size:11px;color:#999;">Din vara</th>
                      <th style="padding:4px 8px;text-align:left;font-size:11px;color:#999;">Produkt</th>
                      <th style="padding:4px 8px;text-align:left;font-size:11px;color:#999;">Pris</th>
                      <th style="padding:4px 8px;text-align:left;font-size:11px;color:#999;">Butik</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                  </table>
                </div>`;
              ]]]
          styles:
            card:
              - border-radius: 16px
              - background: "rgba(251,140,0,0.06)"
              - border: "1px solid rgba(251,140,0,0.20)"
              - padding: 0
            custom_fields:
              body:
                - width: 100%

      # ── Konfigurerade butiker – status ─────────────────────────────
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        entity: sensor.grocery_offers_count
        tap_action:
          action: none
        custom_fields:
          body: |
            [[[
              const stores = entity.attributes.stores || [];
              const lastUpdate = entity.attributes.last_update || '–';
              if (!stores.length) {
                return `<div style="padding:16px;text-align:center;color:#999;font-size:13px;">
                  Inga butiker konfigurerade ännu.<br>
                  Lägg till UUID under Inställningar nedan.
                </div>`;
              }
              const rows = stores.map(s =>
                `<div style="display:flex;justify-content:space-between;align-items:center;
                            padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.05);">
                  <div>
                    <div style="font-weight:600;color:#333;font-size:13px;">${s.name}</div>
                    <div style="font-size:11px;color:#999;">${s.uuid ? s.uuid.substring(0,8)+'...' : ''}</div>
                  </div>
                  <div style="font-weight:700;color:#e65100;font-size:18px;">${s.offer_count}</div>
                </div>`
              ).join('');
              return `<div style="padding:8px 0 4px;">
                <div style="font-size:12px;color:#999;padding:0 12px 8px;">Senast uppdaterad: ${lastUpdate}</div>
                ${rows}
              </div>`;
            ]]]
        styles:
          card:
            - border-radius: 16px
            - border: "1px solid rgba(0,0,0,0.08)"
            - padding: 0
          custom_fields:
            body:
              - width: 100%

      # ── Butikssök – Nära mig ──────────────────────────────────────
      - type: button
        name: "Hitta butiker nära mig"
        icon: mdi:map-marker-radius
        tap_action:
          action: call-service
          service: script.grocery_find_stores_home_btn
        card_mod:
          style: |
            ha-card { border-radius: 14px; background: rgba(251,140,0,0.10); }

      # ── Hittade butiker – picker + Lägg till ─────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_store_picker
            state_not: "– Sök butiker ovan –"
        card:
          type: custom:vertical-stack-in-card
          card_mod:
            style: |
              ha-card { border-radius: 16px !important; overflow: hidden;
                        border: 1px solid rgba(251,140,0,0.30); }
          cards:
            - type: entities
              entities:
                - entity: input_select.grocery_store_picker
                  name: "Välj butik att lägga till"
              card_mod:
                style: |
                  ha-card { border-radius: 0 !important; border-bottom: none; }
            - type: button
              name: "Lägg till vald butik"
              icon: mdi:store-plus-outline
              tap_action:
                action: call-service
                service: script.grocery_add_selected_store_btn
              card_mod:
                style: |
                  ha-card { border-radius: 0 !important;
                            background: linear-gradient(135deg,#e65100,#fb8c00); }

      # ── Konfigurerade butiker – ta bort ────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_configured_picker
            state_not: "– Inga butiker konfigurerade –"
        card:
          type: custom:vertical-stack-in-card
          card_mod:
            style: |
              ha-card { border-radius: 16px !important; overflow: hidden;
                        border: 1px solid rgba(211,47,47,0.25); }
          cards:
            - type: entities
              entities:
                - entity: input_select.grocery_configured_picker
                  name: "Välj butik att ta bort"
              card_mod:
                style: |
                  ha-card { border-radius: 0 !important; border-bottom: none; }
            - type: button
              name: "Ta bort vald butik"
              icon: mdi:store-remove-outline
              tap_action:
                action: call-service
                service: script.grocery_remove_selected_store_btn
              card_mod:
                style: |
                  ha-card { border-radius: 0 !important;
                            background: rgba(211,47,47,0.85); }

      # ── Aktivera/inaktivera ─────────────────────────────────────────
      - type: entities
        title: "Inställningar"
        entities:
          - entity: input_boolean.grocery_offers_enabled
            name: Aktivera erbjudanden
        card_mod:
          style: |
            ha-card { border-radius: 14px; border-left: 4px solid #fb8c00; }

  # ═══════════════════════════════════════════════════════════════════
  # TAB 6: SVINNDAGBOK — Teal identitet  🩵
  # ═══════════════════════════════════════════════════════════════════
  - title: Svinndagbok
    path: svinndagbok
    icon: mdi:recycle
    cards:

      # ── Header ────────────────────────────────────────────────────
      - type: custom:button-card
        name: "Svinndagbok"
        label: Historik över slängda varor · Minska matsvinn
        show_label: true
        show_icon: true
        icon: mdi:leaf-circle-outline
        tap_action:
          action: none
        extra_styles: |
          @keyframes hdr-teal {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
          }
        styles:
          card:
            - background: "linear-gradient(-45deg, #004d40, #00695c, #00796b, #00897b)"
            - background-size: "300% 300%"
            - animation: "hdr-teal 10s ease infinite"
            - border-radius: 20px
            - padding: "20px 24px"
            - box-shadow: "0 8px 32px rgba(0, 77, 64, 0.45)"
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-rows: "min-content min-content"
            - grid-template-columns: "min-content 1fr"
          icon:
            - color: "rgba(255,255,255,0.95)"
            - width: 40px
          name:
            - font-size: 22px
            - font-weight: 800
            - color: white
            - text-align: left
          label:
            - font-size: 12px
            - color: "rgba(255,255,255,0.70)"
            - text-align: left
            - margin-top: 4px

      # ── Totalt svinn – glassmorphism big-number ───────────────────
      - type: custom:button-card
        entity: sensor.grocery_waste_log
        show_name: false
        show_icon: false
        show_state: false
        tap_action:
          action: none
        custom_fields:
          body: |
            [[[
              const v = entity ? entity.state : '–';
              return `<div style="text-align:center;padding:14px 16px 12px;">
                <div style="font-size:11px;color:rgba(0,105,92,0.60);margin-bottom:4px;">🗑️</div>
                <div style="font-size:36px;font-weight:900;color:#00695c;line-height:1;">${v}</div>
                <div style="font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(0,105,92,0.60);margin-top:7px;">VAROR REGISTRERADE TOTALT</div>
              </div>`;
            ]]]
        styles:
          card:
            - background: "rgba(0,121,107,0.10)"
            - border: "1px solid rgba(0,121,107,0.28)"
            - border-radius: "20px"
            - padding: "0"
            - box-shadow: "0 4px 24px rgba(0,77,64,0.18)"
          custom_fields:
            body:
              - width: "100%"

      # ── ApexCharts — svinnutveckling (kumulativt, 30 dagar) ───────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Svinnutveckling — senaste 30 dagarna
          show_states: true
          colorize_states: true
        graph_span: 30d
        apex_config:
          chart:
            toolbar:
              show: false
            zoom:
              enabled: false
          stroke:
            curve: stepline
            width: 2
          fill:
            type: gradient
            gradient:
              shadeIntensity: 1
              opacityFrom: 0.55
              opacityTo: 0.05
              stops:
                - 0
                - 100
          grid:
            borderColor: "rgba(128,128,128,0.12)"
          tooltip:
            theme: dark
        series:
          - entity: sensor.grocery_waste_log
            name: Totalt svinn
            color: "#00796b"
            stroke_width: 2
            fill_raw: last
            show:
              in_header: true
              legend_value: true
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              border-left: 4px solid #00796b;
            }

      # ── Vanligaste svinnvaror ─────────────────────────────────────
      - type: markdown
        title: "🏆 Vanligaste svinnvaror"
        content: |
          {% set log = state_attr('sensor.grocery_waste_log', 'log') | default([]) | list %}
          {% if log | length == 0 %}
          _Ingen historik ännu — bra jobbat!_ 🌱
          {% else %}
          {% set names = log | map(attribute='name') | unique | list | sort %}
          {% set ns = namespace(rows=[]) %}
          {% for name in names %}
            {% set count = log | selectattr('name','eq', name) | list | count %}
            {% set ns.rows = ns.rows + [{'name': name, 'count': count}] %}
          {% endfor %}
          {% set sorted = ns.rows | sort(attribute='count', reverse=true) %}
          {% for row in sorted[:8] %}
          {% set bar_filled = (row.count * 3) | int %}
          {% set bar = '▓' * [bar_filled, 12] | min + '░' * (12 - [bar_filled, 12] | min) %}
          **{{ row.name }}** `{{ bar }}` {{ row.count }}×
          {% endfor %}
          {% if names | length > 8 %}
          _… och {{ names | length - 8 }} fler_
          {% endif %}
          {% endif %}
        card_mod:
          style:
            .: |
              ha-card {
                border-radius: 16px;
                background: rgba(0,121,107,0.06);
                border: 1px solid rgba(0,121,107,0.18);
                border-top: 4px solid #00897b;
              }
            "ha-markdown$": |
              strong { color: var(--primary-text-color); }
              code {
                font-size: 0.70em;
                letter-spacing: -1px;
                color: #00897b;
                background: transparent;
                font-family: monospace;
              }
              p { margin: 7px 0; line-height: 1.5; }

      # ── Denna månaden ─────────────────────────────────────────────
      - type: markdown
        title: "📅 Denna månaden"
        content: |
          {% set log = state_attr('sensor.grocery_waste_log', 'log') | default([]) | list %}
          {% set this_month = now().strftime('%Y-%m') %}
          {% set ns = namespace(monthly=[]) %}
          {% for item in log %}
            {% if item.date[:7] == this_month %}
              {% set ns.monthly = ns.monthly + [item] %}
            {% endif %}
          {% endfor %}
          {% if ns.monthly | length == 0 %}
          _Inget svinn registrerat denna månad. Imponerande!_ 🌱
          {% else %}
          **{{ ns.monthly | length }} varor** slängda hittills i {{ now().strftime('%B %Y') }}

          {% for item in ns.monthly | reverse %}
          - **{{ item.date[8:] }}/{{ item.date[5:7] }}** — {{ item.name }}{% if item.source not in ['mobile', 'manual'] %} _({{ item.source }})_{% endif %}
          {% endfor %}
          {% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              border-top: 4px solid #00796b;
              border-left: none;
              background: rgba(0, 121, 107, 0.06);
            }

      # ── Historik ──────────────────────────────────────────────────
      - type: markdown
        title: "🗓️ Svinnhistorik"
        content: |
          {% set log = state_attr('sensor.grocery_waste_log', 'log') | default([]) | list %}
          {% if log | length == 0 %}
          _Ingen historik ännu. Börja skanna förpackningar när du slänger dem!_
          {% else %}
          {% set ns = namespace(last_month='') %}
          {% for item in log | reverse %}
          {% if loop.index <= 60 %}
          {% set m = item.date[:7] %}
          {% if m != ns.last_month %}
          #### {{ m }}
          {% set ns.last_month = m %}
          {% endif %}
          - **{{ item.date[8:] }}/{{ item.date[5:7] }}** {{ item.name }}
          {% endif %}
          {% endfor %}
          {% if log | length > 60 %}
          _... och {{ log | length - 60 }} äldre poster_
          {% endif %}
          {% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              border-left: 3px dashed rgba(0, 121, 107, 0.45);
            }
