title: Matlagret
# 💡 Kök-platta / tablet-tips:
#    Bokmärk URL:en med ?kiosk i slutet för att dölja sidebar och header:
#    https://<din-ha-url>/grocery-dashboard/skanna?kiosk
#    kiosk-mode-kortet är installerat och hanterar detta automatiskt.

views:

  # ═══════════════════════════════════════════════════════════════════
  # TAB 1: SKANNA — Grön identitet  🟢
  # ═══════════════════════════════════════════════════════════════════
  - title: Skanna
    path: skanna
    icon: mdi:barcode-scan
    cards:

      # ── Header med shimmer-animation ──────────────────────────────
      - type: custom:button-card
        name: "Matlagret"
        label: Skanna varor · Hantera lager · Minska svinn
        show_label: true
        show_icon: true
        icon: mdi:fridge-outline
        tap_action:
          action: none
        extra_styles: |
          @keyframes hdr-green {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
          }
        styles:
          card:
            - background: "linear-gradient(-45deg, #1b5e20, #2e7d32, #388e3c, #43a047)"
            - background-size: "300% 300%"
            - animation: "hdr-green 10s ease infinite"
            - border-radius: 20px
            - padding: "20px 24px"
            - box-shadow: "0 8px 32px rgba(27, 94, 32, 0.45)"
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-rows: "min-content min-content"
            - grid-template-columns: "min-content 1fr"
          icon:
            - color: "rgba(255,255,255,0.95)"
            - width: 40px
          name:
            - font-size: 22px
            - font-weight: 800
            - color: white
            - text-align: left
            - letter-spacing: "0.3px"
          label:
            - font-size: 12px
            - color: "rgba(255,255,255,0.70)"
            - text-align: left
            - margin-top: 4px

      # ── Statrad — 2×2 stor glassmorphism big-number grid ──────────
      # Använder custom_fields + JS-template (entity.state) — fungerar med alla button-card-versioner
      - type: grid
        columns: 2
        square: false
        cards:

          # Totalt i lager
          - type: custom:button-card
            entity: sensor.grocery_total_items
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            custom_fields:
              body: |
                [[[
                  const v = entity ? entity.state : '–';
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:11px;color:rgba(46,125,50,0.60);margin-bottom:4px;">📦</div>
                    <div style="font-size:36px;font-weight:900;color:#2e7d32;line-height:1;">${v}</div>
                    <div style="font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(46,125,50,0.60);margin-top:7px;">VAROR I LAGER</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(46,125,50,0.10)"
                - border: "1px solid rgba(46,125,50,0.30)"
                - border-radius: "20px"
                - padding: "0"
                - box-shadow: "0 4px 24px rgba(46,125,50,0.12)"
              custom_fields:
                body:
                  - width: "100%"

          # Snart utgångna
          - type: custom:button-card
            entity: sensor.grocery_expiring_soon
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            extra_styles: |
              @keyframes glow-warn {
                0%, 100% { box-shadow: 0 4px 20px rgba(255,152,0,0.20); }
                50%      { box-shadow: 0 4px 36px rgba(255,152,0,0.70); }
              }
            custom_fields:
              body: |
                [[[
                  const v = entity ? entity.state : '–';
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:11px;color:#ff9800;margin-bottom:4px;">⏰</div>
                    <div style="font-size:36px;font-weight:900;color:#ff9800;line-height:1;">${v}</div>
                    <div style="font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,152,0,0.60);margin-top:7px;">SNART UTGÅNGNA</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(255,152,0,0.10)"
                - border: "1px solid rgba(255,152,0,0.30)"
                - border-radius: "20px"
                - padding: "0"
                - "{% if states('sensor.grocery_expiring_soon') | int(0) > 0 %}animation: glow-warn 2.5s ease-in-out infinite{% else %}box-shadow: 0 4px 20px rgba(0,0,0,0.12){% endif %}"
              custom_fields:
                body:
                  - width: "100%"

          # Utgångna
          - type: custom:button-card
            entity: sensor.grocery_expired
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            extra_styles: |
              @keyframes glow-danger {
                0%, 100% { box-shadow: 0 4px 20px rgba(244,67,54,0.20); }
                50%      { box-shadow: 0 4px 36px rgba(244,67,54,0.70); }
              }
            custom_fields:
              body: |
                [[[
                  const v = entity ? entity.state : '–';
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:11px;color:#f44336;margin-bottom:4px;">⚠️</div>
                    <div style="font-size:36px;font-weight:900;color:#f44336;line-height:1;">${v}</div>
                    <div style="font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(244,67,54,0.60);margin-top:7px;">UTGÅNGNA</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(244,67,54,0.10)"
                - border: "1px solid rgba(244,67,54,0.30)"
                - border-radius: "20px"
                - padding: "0"
                - "{% if states('sensor.grocery_expired') | int(0) > 0 %}animation: glow-danger 1.8s ease-in-out infinite{% else %}box-shadow: 0 4px 20px rgba(0,0,0,0.12){% endif %}"
              custom_fields:
                body:
                  - width: "100%"

          # Lågt lager
          - type: custom:button-card
            entity: sensor.grocery_low_stock
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            extra_styles: |
              @keyframes glow-low {
                0%, 100% { box-shadow: 0 4px 20px rgba(255,87,34,0.20); }
                50%      { box-shadow: 0 4px 32px rgba(255,87,34,0.65); }
              }
            custom_fields:
              body: |
                [[[
                  const v = entity ? entity.state : '–';
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:11px;color:#ff5722;margin-bottom:4px;">📉</div>
                    <div style="font-size:36px;font-weight:900;color:#ff5722;line-height:1;">${v}</div>
                    <div style="font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,87,34,0.60);margin-top:7px;">LÅGT LAGER</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(255,87,34,0.08)"
                - border: "1px solid rgba(255,87,34,0.25)"
                - border-radius: "20px"
                - padding: "0"
                - "{% if states('sensor.grocery_low_stock') | int(0) > 0 %}animation: glow-low 2s ease-in-out infinite{% else %}box-shadow: 0 4px 20px rgba(0,0,0,0.12){% endif %}"
              custom_fields:
                body:
                  - width: "100%"

      # ── Lager per plats — progress-bar kort (JS-template) ─────────
      - type: horizontal-stack
        cards:

          # KYL — tema-säkra färger (var(--primary-text-color) fungerar på light och dark)
          - type: custom:button-card
            entity: sensor.grocery_location_kyl
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            custom_fields:
              inner: |
                [[[
                  const n = parseInt(entity && entity.state) || 0;
                  const te = states['sensor.grocery_total_items'];
                  const total = parseInt(te && te.state) || 1;
                  const pct = Math.min(Math.round(n / total * 100), 100);
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:32px;font-weight:900;color:#1565c0;line-height:1;">${n}</div>
                    <div style="font-size:11px;margin:5px 0 4px;letter-spacing:0.5px;color:var(--primary-text-color);">🧊 Kyl</div>
                    <div style="height:4px;background:rgba(21,101,192,0.15);border-radius:3px;overflow:hidden;margin:6px 4px 4px;">
                      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:3px;"></div>
                    </div>
                    <div style="font-size:9px;color:var(--secondary-text-color);letter-spacing:0.5px;">${pct}%</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(21,101,192,0.08)"
                - border: "2px solid rgba(21,101,192,0.30)"
                - border-radius: "18px"
                - padding: "0"
                - overflow: "hidden"
              custom_fields:
                inner:
                  - width: "100%"

          # FRYS
          - type: custom:button-card
            entity: sensor.grocery_location_frys
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            custom_fields:
              inner: |
                [[[
                  const n = parseInt(entity && entity.state) || 0;
                  const te = states['sensor.grocery_total_items'];
                  const total = parseInt(te && te.state) || 1;
                  const pct = Math.min(Math.round(n / total * 100), 100);
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:32px;font-weight:900;color:#00838f;line-height:1;">${n}</div>
                    <div style="font-size:11px;margin:5px 0 4px;letter-spacing:0.5px;color:var(--primary-text-color);">❄️ Frys</div>
                    <div style="height:4px;background:rgba(0,131,143,0.15);border-radius:3px;overflow:hidden;margin:6px 4px 4px;">
                      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#00838f,#4dd0e1);border-radius:3px;"></div>
                    </div>
                    <div style="font-size:9px;color:var(--secondary-text-color);letter-spacing:0.5px;">${pct}%</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(0,131,143,0.08)"
                - border: "2px solid rgba(0,131,143,0.30)"
                - border-radius: "18px"
                - padding: "0"
                - overflow: "hidden"
              custom_fields:
                inner:
                  - width: "100%"

          # SKAFFERI
          - type: custom:button-card
            entity: sensor.grocery_location_skafferi
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            custom_fields:
              inner: |
                [[[
                  const n = parseInt(entity && entity.state) || 0;
                  const te = states['sensor.grocery_total_items'];
                  const total = parseInt(te && te.state) || 1;
                  const pct = Math.min(Math.round(n / total * 100), 100);
                  return `<div style="text-align:center;padding:14px 8px 12px;">
                    <div style="font-size:32px;font-weight:900;color:#e65100;line-height:1;">${n}</div>
                    <div style="font-size:11px;margin:5px 0 4px;letter-spacing:0.5px;color:var(--primary-text-color);">🏠 Skafferi</div>
                    <div style="height:4px;background:rgba(230,81,0,0.15);border-radius:3px;overflow:hidden;margin:6px 4px 4px;">
                      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#e65100,#ffca28);border-radius:3px;"></div>
                    </div>
                    <div style="font-size:9px;color:var(--secondary-text-color);letter-spacing:0.5px;">${pct}%</div>
                  </div>`;
                ]]]
            styles:
              card:
                - background: "rgba(230,81,0,0.08)"
                - border: "2px solid rgba(230,81,0,0.30)"
                - border-radius: "18px"
                - padding: "0"
                - overflow: "hidden"
              custom_fields:
                inner:
                  - width: "100%"

      # ── Scanner ───────────────────────────────────────────────────
      - type: custom:grocery-scanner-card
        title: Matscanner
        ios_shortcut_add: "Lägg till vara"
        ios_shortcut_remove: "Ta bort vara"


  # ═══════════════════════════════════════════════════════════════════
  # TAB 2: INKÖPSLISTA — Blå identitet  🔵
  # ═══════════════════════════════════════════════════════════════════
  - title: Inköpslista
    path: inkopslista
    icon: mdi:cart
    cards:

      # ── Header ────────────────────────────────────────────────────
      - type: custom:button-card
        name: "Inköpslista"
        label: Bocka av varor · Tryck "Klar" när du är färdig i butiken
        show_label: true
        show_icon: true
        icon: mdi:cart-outline
        tap_action:
          action: none
        extra_styles: |
          @keyframes hdr-blue {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
          }
        styles:
          card:
            - background: "linear-gradient(-45deg, #0d47a1, #1565c0, #1976d2, #1e88e5)"
            - background-size: "300% 300%"
            - animation: "hdr-blue 10s ease infinite"
            - border-radius: 20px
            - padding: "20px 24px"
            - box-shadow: "0 8px 32px rgba(13, 71, 161, 0.45)"
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-rows: "min-content min-content"
            - grid-template-columns: "min-content 1fr"
          icon:
            - color: "rgba(255,255,255,0.95)"
            - width: 40px
          name:
            - font-size: 22px
            - font-weight: 800
            - color: white
            - text-align: left
          label:
            - font-size: 12px
            - color: "rgba(255,255,255,0.70)"
            - text-align: left
            - margin-top: 4px

      # ── Inköpslista ───────────────────────────────────────────────
      - type: todo-list
        entity: todo.shopping_list
        hide_completed: false
        card_mod:
          style: |
            ha-card {
              border-radius: 18px !important;
              overflow: hidden;
              border: 1px solid rgba(255,255,255,0.08);
            }

      # ── Grupperade åtgärdsknappar (inga gap — ser ut som en enhet) ─
      - type: custom:vertical-stack-in-card
        card_mod:
          style: |
            ha-card {
              border-radius: 18px !important;
              overflow: hidden;
              border: 1px solid rgba(255,255,255,0.08);
            }
        cards:
          - type: custom:button-card
            name: "✅  Jag är klar — ta bort inhandlade varor"
            show_icon: false
            tap_action:
              action: call-service
              service: script.grocery_clear_shopping_list_btn
            styles:
              card:
                - background: "linear-gradient(135deg, #1b5e20, #43a047)"
                - border-radius: 0
                - padding: "18px 20px"
                - box-shadow: none
                - margin: 0
              name:
                - font-size: 15px
                - font-weight: 700
                - color: white
          - type: custom:button-card
            name: "📤  Skicka lista till telefon"
            show_icon: false
            tap_action:
              action: call-service
              service: script.grocery_push_shopping_list_btn
            styles:
              card:
                - background: "linear-gradient(135deg, #0d47a1, #1976d2)"
                - border-radius: 0
                - padding: "16px 20px"
                - border-top: "1px solid rgba(255,255,255,0.12)"
                - box-shadow: none
                - margin: 0
              name:
                - font-size: 14px
                - font-weight: 600
                - color: white
          - type: custom:button-card
            name: "✨  Föreslå varor att handla"
            show_icon: false
            tap_action:
              action: call-service
              service: script.grocery_generate_shopping_list_btn
            styles:
              card:
                - background: "linear-gradient(135deg, #00695c, #00897b)"
                - border-radius: 0
                - padding: "16px 20px"
                - border-top: "1px solid rgba(255,255,255,0.12)"
                - box-shadow: none
                - margin: 0
              name:
                - font-size: 14px
                - font-weight: 600
                - color: white


  # ═══════════════════════════════════════════════════════════════════
  # TAB 3: RECEPTFÖRSLAG — Orange/Röd identitet  🟠
  # ═══════════════════════════════════════════════════════════════════
  - title: Receptförslag
    path: recept
    icon: mdi:chef-hat
    cards:

      # ── Header ────────────────────────────────────────────────────
      - type: custom:button-card
        name: "Receptförslag"
        label: AI-recept baserade på vad som snart går ut
        show_label: true
        show_icon: true
        icon: mdi:chef-hat
        tap_action:
          action: none
        extra_styles: |
          @keyframes hdr-orange {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
          }
        styles:
          card:
            - background: "linear-gradient(-45deg, #bf360c, #d84315, #e64a19, #f4511e)"
            - background-size: "300% 300%"
            - animation: "hdr-orange 10s ease infinite"
            - border-radius: 20px
            - padding: "20px 24px"
            - box-shadow: "0 8px 32px rgba(191, 54, 12, 0.45)"
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-rows: "min-content min-content"
            - grid-template-columns: "min-content 1fr"
          icon:
            - color: "rgba(255,255,255,0.95)"
            - width: 40px
          name:
            - font-size: 22px
            - font-weight: 800
            - color: white
            - text-align: left
          label:
            - font-size: 12px
            - color: "rgba(255,255,255,0.70)"
            - text-align: left
            - margin-top: 4px

      # ── Aktiv leverantör + senast uppdaterad ──────────────────────
      - type: custom:mushroom-template-card
        primary: >
          {% set p = states('input_select.grocery_recipe_provider') %}
          {% if p == 'groq' %}🟠 Groq – Llama 3.3 70B
          {% elif p == 'gemini' %}🔵 Gemini 2.0 Flash
          {% elif p == 'openrouter' %}🟣 OpenRouter – Mistral
          {% elif p == 'mistral' %}🩷 Mistral Small
          {% elif p == 'openai' %}🟢 GPT-4o Mini
          {% elif p == 'anthropic' %}🟡 Claude Haiku
          {% elif p == 'ha_ai_task' %}🩵 HA AI Task
          {% else %}Ingen AI vald — klicka för att välja{% endif %}
        secondary: "🕐 {{ states('sensor.grocery_last_recipe') }}"
        icon: mdi:robot-outline
        icon_color: >
          {% set p = states('input_select.grocery_recipe_provider') %}
          {% if p == 'disabled' %}disabled
          {% elif p in ['groq','openrouter'] %}deep-orange
          {% elif p in ['gemini','openai'] %}blue
          {% elif p == 'anthropic' %}amber
          {% elif p == 'mistral' %}pink
          {% else %}teal{% endif %}
        tap_action:
          action: navigate
          navigation_path: /grocery-dashboard/installningar
        card_mod:
          style: |
            ha-card { border-radius: 14px; }

      # ── Receptkort — glassmorphism ─────────────────────────────────
      - type: markdown
        card_mod:
          style: |
            ha-card {
              border-radius: 20px;
              background: rgba(191,54,12,0.08);
              border: 1px solid rgba(230,74,25,0.25);
              box-shadow: 0 6px 28px rgba(191,54,12,0.16);
              overflow: hidden;
            }
        content: |
          {% set recipe = state_attr('sensor.grocery_last_recipe', 'recipe') %}
          {% set updated = states('sensor.grocery_last_recipe') %}
          {% set ingredients = state_attr('sensor.grocery_last_recipe', 'ingredients') %}
          {% set kwh = state_attr('sensor.grocery_last_recipe', 'cooking_kwh') %}
          {% set cost = state_attr('sensor.grocery_last_recipe', 'cooking_cost_kr') %}
          {% set appliance = state_attr('sensor.grocery_last_recipe', 'cooking_appliance') %}
          {% set minutes = state_attr('sensor.grocery_last_recipe', 'cooking_minutes') %}
          {% set price = state_attr('sensor.grocery_last_recipe', 'electricity_price') %}
          {% if recipe %}
          _📅 {{ updated }}_&nbsp;&nbsp;&nbsp;_🥕 {{ ingredients }}_

          ---

          {{ recipe }}

          ---

          {% if kwh and kwh | float(0) > 0 %}
          {% set a_emoji = {'spis': '🍳', 'ugn': '🔥', 'mikro': '📡'} %}
          {% set emoji = a_emoji[appliance] if appliance in a_emoji else '⚡' %}
          {{ emoji }} **{{ appliance | capitalize }}** · {{ minutes }} min · {{ kwh }} kWh · ca **{{ cost }} kr** _({{ price }} kr/kWh)_
          {% endif %}
          {% set actual_kwh = states('input_number.grocery_actual_cooking_kwh') | float(0) %}
          {% set actual_cost = states('input_number.grocery_actual_cooking_cost') | float(0) %}
          {% if actual_kwh > 0 %}
          📊 **Faktisk förbrukning** (Tibber Pulse): {{ actual_kwh }} kWh · **{{ actual_cost }} kr**
          _Inkluderar all förbrukning i hemmet under matlagningen_
          {% endif %}
          {% else %}
          ### 👨‍🍳 Inga receptförslag ännu

          Välj en AI-leverantör nedan och klicka på en knapp.
          Recepten baseras på ingredienser som snart går ut — det är så vi minskar matsvinnet!
          {% endif %}

      # ── Matlagningssession – Starta ───────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.grocery_cooking_active
            state: "off"
        card:
          type: custom:button-card
          name: "🍳  Starta matlagningssession"
          label: Mäter faktisk elförbrukning via Tibber Pulse
          show_label: true
          show_icon: false
          tap_action:
            action: call-service
            service: script.grocery_start_cooking_btn
          styles:
            card:
              - background: "linear-gradient(135deg, #e64a19, #bf360c)"
              - border-radius: 14px
              - padding: "18px 20px"
              - box-shadow: "0 3px 14px rgba(191,54,12,0.38)"
            name:
              - font-size: 15px
              - font-weight: 700
              - color: white
            label:
              - font-size: 11px
              - color: "rgba(255,255,255,0.75)"
              - margin-top: 4px

      # ── Matlagningssession – Pågår ────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.grocery_cooking_active
            state: "on"
        card:
          type: custom:vertical-stack-in-card
          card_mod:
            style: |
              ha-card {
                border-radius: 16px !important;
                overflow: hidden;
                border: 1px solid rgba(230,74,25,0.35);
              }
          cards:
            - type: custom:mushroom-template-card
              primary: "Matlagning pågår..."
