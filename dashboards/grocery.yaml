          - entity: input_number.grocery_power_spis
            name: "🍳 Spis"
          - entity: input_number.grocery_power_ugn
            name: "🔥 Ugn"
          - entity: input_number.grocery_power_mikro
            name: "📡 Mikrovågsugn"
