              - box-shadow: "0 2px 12px rgba(191,54,12,0.35)"
            name:
              - font-size: 15px
              - font-weight: 700
              - color: white

      # ── Instruktioner per leverantör ──────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: groq
        card:
          type: markdown
          content: |
            **Groq** — Llama 3.3 70B, helt gratis, ingen kreditkort
            1. Gå till [console.groq.com](https://console.groq.com)
            2. Skapa ett konto
            3. Klicka **API Keys → Create API Key**
            4. Klistra in nyckeln i fältet ovan
          card_mod:
            style: |
              ha-card { border-radius: 14px; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: openrouter
        card:
          type: markdown
          content: |
            **OpenRouter** — 25+ gratis AI-modeller, logga in med GitHub/Google
            1. Gå till [openrouter.ai/keys](https://openrouter.ai/keys)
            2. Logga in med Google eller GitHub
            3. Klicka **Create Key**
            4. Klistra in nyckeln i fältet ovan

            _Modell: `mistralai/mistral-small-3.1-24b-instruct:free` — automatisk fallback vid rate-limit_
          card_mod:
            style: |
              ha-card { border-radius: 14px; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: mistral
        card:
          type: markdown
          content: |
            **Mistral AI** — Mistral Small, gratis-tier (kräver telefonnummer, ej kreditkort)
            1. Gå till [console.mistral.ai](https://console.mistral.ai)
            2. Skapa ett konto
            3. Klicka **API Keys → Create new key**
            4. Klistra in nyckeln i fältet ovan
          card_mod:
            style: |
              ha-card { border-radius: 14px; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: openai
        card:
          type: markdown
          content: |
            **OpenAI** — GPT-4o Mini (~$0.003/receptförslag)

            > ⚠️ **ChatGPT Plus ≠ API-åtkomst** — Plus ger tillgång till chat.openai.com, inte API:et.

            1. Gå till [platform.openai.com](https://platform.openai.com) _(separat konto)_
            2. Lägg till betalningsmetod
            3. **API Keys → Create new secret key**
            4. Klistra in nyckeln i fältet ovan
          card_mod:
            style: |
              ha-card { border-radius: 14px; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: anthropic
        card:
          type: markdown
          content: |
            **Anthropic Claude** — Claude Haiku, bäst kvalitet

            > ⚠️ **Claude.ai Pro ≠ API-åtkomst** — Pro ger tillgång till claude.ai, inte API:et.

            1. Gå till [console.anthropic.com](https://console.anthropic.com) _(separat konto)_
            2. Lägg till betalningsmetod
            3. **API Keys → Create Key**
            4. Klistra in nyckeln i fältet ovan
          card_mod:
            style: |
              ha-card { border-radius: 14px; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: ha_ai_task
        card:
          type: markdown
          content: |
            **HA AI Task** — Ingen API-nyckel behövs här
            Kräver att du har en AI-integration konfigurerad i HA:
            **Inställningar → Enheter & tjänster → Lägg till integration**
            Sök efter t.ex. **Google Generative AI** eller **OpenRouter**
          card_mod:
            style: |
              ha-card { border-radius: 14px; border-left: 4px solid #0097a7; }

      # ── Översikt när inaktiverat ──────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: disabled
        card:
          type: markdown
          content: |
            ### Välj en AI-leverantör ovan för att aktivera receptförslag

            #### 🟢 Gratis — ingen kreditkort krävs
            | Leverantör | Modell | Nyckel från |
            |---|---|---|
