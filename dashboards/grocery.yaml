      - type: custom:mushroom-select-card
        entity: input_select.grocery_recipe_provider
        name: AI-leverantör för receptförslag
        icon: mdi:robot-outline

      # ── Nyckel-fält per leverantör ────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: groq
        card:
          type: entities
          title: "🟢 Groq – gratis, ingen kreditkort"
          entities:
            - entity: input_text.grocery_api_key_groq
              name: API-nyckel
          card_mod:
            style: |
              ha-card { border-radius: 14px; border-left: 4px solid #f97316; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: openrouter
        card:
          type: entities
          title: "🟢 OpenRouter – gratis-tier, 25+ modeller"
          entities:
            - entity: input_text.grocery_api_key_openrouter
              name: API-nyckel
          card_mod:
            style: |
              ha-card { border-radius: 14px; border-left: 4px solid #7c3aed; }

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state: mistral
        card:
          type: entities
          title: "🟢 Mistral – gratis-tier"
          entities:
            - entity: input_text.grocery_api_key_mistral
              name: API-nyckel
          card_mod:
            style: |
              ha-card { border-radius: 14px; border-left: 4px solid #db2777; }

