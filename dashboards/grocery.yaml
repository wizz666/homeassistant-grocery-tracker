        conditions:
          - condition: state
            entity: input_select.grocery_recipe_provider
            state_not: disabled
        card:
          type: custom:button-card
          name: "👨‍🍳  Testa receptförslag nu"
          show_icon: false
          tap_action:
            action: call-service
            service: script.grocery_suggest_recipes_btn
